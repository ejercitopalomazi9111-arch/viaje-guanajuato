<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Codes · Science Fair — Journey to Guanajuato</title>
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --ink:#241a14; --muted:#6b5c50; --gold:#b07e22; --line:#e4dbcd; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #f6f1e8; color: var(--ink); font-family: 'Space Grotesk', system-ui, sans-serif; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 32px 24px 60px; }
  header { text-align: center; margin-bottom: 26px; }
  header .eyebrow { font: 500 12px/1 'JetBrains Mono', monospace; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); }
  header h1 { font: 600 32px/1.1 'Cormorant Garamond', serif; margin: 8px 0 6px; }
  header p { color: var(--muted); font-size: 14px; margin: 0 auto; max-width: 64ch; }
  .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); }
  .qr {
    background: #fff; border: 1px solid var(--line); border-radius: 16px;
    padding: 20px; text-align: center; break-inside: avoid; page-break-inside: avoid;
  }
  .qr.is-model { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(176,126,34,.10); }
  .qr .tag { font: 500 10px/1 'JetBrains Mono', monospace; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); }
  .qr.is-virtual .tag { color: var(--muted); }
  .qr img { width: 190px; height: 190px; margin: 12px auto 10px; display: block; image-rendering: pixelated; }
  .qr h2 { font: 600 20px/1.15 'Cormorant Garamond', serif; margin: 4px 0 2px; }
  .qr .sub { font-size: 12px; color: var(--muted); margin: 0 0 8px; }
  .qr .scan { font-size: 12px; color: var(--ink); font-weight: 500; }
  .qr .url { font: 400 9px/1.3 'JetBrains Mono', monospace; color: #a99e8f; margin-top: 8px; word-break: break-all; }
  .print-btn {
    display:block; margin: 0 auto 26px; padding: 12px 22px; border:none; border-radius: 10px;
    background: var(--gold); color:#fff; font: 600 14px 'Space Grotesk'; cursor:pointer;
  }
  .home-link { display:block; text-align:center; margin-bottom:20px; color:var(--gold); font-size:13px; text-decoration:none; }
  @media print {
    body { background: #fff; }
    .print-btn, .home-link { display: none; }
    .wrap { padding: 0; max-width: none; }
    .qr { border-color: #ccc; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="assets/img/logo_rembrandt.png" alt="Instituto Rembrandt" style="height:84px;width:auto;display:block;margin:0 auto 10px;">
    <span class="eyebrow">Instituto Rembrandt · Science Fair</span>
    <h1>Tour QR codes</h1>
    <p>Print this sheet, cut out each card and place it next to its model or station. Visitors scan the code with their phone camera to open the video and the description.</p>
  </header>

  <a class="home-link" href="index.html">&larr; Back to the main site</a>
  <button class="print-btn" onclick="window.print()">Print QR sheet</button>

  <div class="grid" id="grid"></div>
</div>

<script>
  const BASE = 'https://ejercitopalomazi9111-arch.github.io/viaje-guanajuato/';
  const ITEMS = [
    { kind:'model',   tag:'Model · Start',   title:'Valenciana Silver Mine', sub:'Physical model · orbital view', img:'qr/qr-mina.png',      path:'feria.html?stop=mina' },
    { kind:'model',   tag:'Model · End',     title:'Monument to El Pípila',  sub:'Physical model · orbital view', img:'qr/qr-pipila.png',    path:'feria.html?stop=pipila' },
    { kind:'virtual', tag:'Station',         title:'The Garden',             sub:'Herbs watered with the sink',   img:'qr/qr-garden.png',    path:'jardin.html' },
    { kind:'virtual', tag:'Technology · 3D', title:'Hotel 3D',               sub:'Posada Rembrandt · walk in WASD',img:'qr/qr-hotel.png',     path:'hotel.html' },
    { kind:'virtual', tag:'Video · ≈10 min', title:'Trip Videoblog',         sub:'Video chronicle of the trip',   img:'qr/qr-videoblog.png', path:'videoblog.html' },
    { kind:'virtual', tag:'Full tour',       title:'Interactive Map',        sub:'The 13 stops of the journey',   img:'qr/qr-map.png',       path:'index.html' }
  ];

  document.getElementById('grid').innerHTML = ITEMS.map(it => {
    const full = BASE + it.path;
    return `
      <div class="qr is-${it.kind} ${it.kind === 'model' ? 'is-model' : ''}">
        <span class="tag">${it.tag}</span>
        <img src="${it.img}" alt="QR ${it.title}">
        <h2>${it.title}</h2>
        <p class="sub">${it.sub}</p>
        <p class="scan">Scan with your camera</p>
        <p class="url">${full}</p>
      </div>`;
  }).join('');
</script>
</body>
</html>
